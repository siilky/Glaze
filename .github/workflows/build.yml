name: Build Release Artifacts

on:
  workflow_dispatch:

jobs:

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Web Project
        run: npx vite build

      - name: Capacitor Sync
        run: npx cap sync ios

      - name: Build App Archive
        run: |
          xcodebuild -project ios/App/App.xcodeproj \
                     -scheme App \
                     -configuration Release \
                     -destination 'generic/platform=iOS' \
                     -archivePath App.xcarchive archive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_METHOD=manual \
                     -skipPackagePluginValidation

      - name: Create IPA Structure
        run: |
          mkdir -p Payload
          cp -r App.xcarchive/Products/Applications/App.app Payload/
          zip -r App.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SillyCradle-Unsigned-IPA
          path: App.ipa

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Dependencies
        run: npm ci

      - name: Build Web Project
        run: npx vite build

      - name: Capacitor Sync Android
        run: npx cap sync android

      - name: Decode Keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_B64" | base64 --decode > "${{ github.workspace }}/glaze-release.jks"

      - name: Build Signed Release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/glaze-release.jks
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleRelease --no-daemon

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: SillyCradle-Signed-APK
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Clean Up Keystore
        if: always()
        run: rm -f "${{ github.workspace }}/glaze-release.jks"

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Web Project
        run: npx vite build

      - name: Build Electron App
        run: npx electron-builder --win

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Glaze-Windows-Setup
          path: dist_electron/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot dpkg rpm libarchive-tools
          npm ci

      - name: Build Web Project
        run: npx vite build

      - name: Build Electron App
        run: npx electron-builder --linux deb pacman AppImage

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Glaze-Linux-Packages
          path: |
            dist_electron/*.deb
            dist_electron/*.pacman
            dist_electron/*.AppImage

  release:
    needs: [build-ios, build-android, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: SillyCradle-Signed-APK
          path: ./release-files

      - name: Download IPA
        uses: actions/download-artifact@v4
        with:
          name: SillyCradle-Unsigned-IPA
          path: ./release-files

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: Glaze-Windows-Setup
          path: ./release-files

      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: Glaze-Linux-Packages
          path: ./release-files

      - name: Get version from package.json
        id: ver
        run: echo "version=$(node -p "require('./package.json').version.replace(/\s+/g, '-')")" >> $GITHUB_OUTPUT

      - name: Rename artifacts
        run: |
          mv release-files/app-release.apk "release-files/Glaze-${{ steps.ver.outputs.version }}.apk"
          mv release-files/App.ipa         "release-files/Glaze-${{ steps.ver.outputs.version }}.ipa"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.ver.outputs.version }}"
          name: "Glaze ${{ steps.ver.outputs.version }}"
          files: release-files/*
          generate_release_notes: true
